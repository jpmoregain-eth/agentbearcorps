{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2 class="card-title">Step 1: Agent Identity</h2>
    <p class="card-description">Let's give your agent a name and personality.</p>
    
    <form method="POST" action="/setup/1">
        <div class="form-group">
            <label for="agent_name">Agent Name *</label>
            <input 
                type="text" 
                id="agent_name" 
                name="agent_name" 
                placeholder="e.g., CodeWizard, DataMiner, HelperBot"
                value="{{ progress.get('step_1', {}).get('agent_name', '') }}"
                required
            >
            <p class="help-text">This is how you'll refer to your agent.</p>
        </div>
        
        <div class="form-group">
            <label for="owner_name">Your Name *</label>
            <input 
                type="text" 
                id="owner_name" 
                name="owner_name" 
                placeholder="e.g., Derek, Dr. Smith"
                value="{{ progress.get('step_1', {}).get('owner_name', '') }}"
                required
            >
            <p class="help-text">The agent will know you by this name.</p>
        </div>
        
        <div class="form-group">
            <label for="language">Interface Language</label>
            <select id="language" name="language">
                {% for lang in languages %}
                <option 
                    value="{{ lang.code }}"
                    {% if progress.get('step_1', {}).get('language') == lang.code %}selected{% endif %}
                >
                    {{ lang.name }}
                </option>
                {% endfor %}
            </select>
            <p class="help-text">The language the wizard will use.</p>
        </div>
        
        <div class="button-group" style="justify-content: flex-end;">
            <button type="submit" class="btn btn-primary">
                Next →
            </button>
        </div>
    </form>
</div>

{% endblock %}
