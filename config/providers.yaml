anthropic:
  name: Anthropic (USA)
  description: Claude models - Best for coding and reasoning
  endpoint: https://api.anthropic.com/v1/messages
  api_key_prefix: sk-ant-
  docs_url: https://console.anthropic.com
  region: US
  models:
    - id: claude-opus-4-6
      name: Claude Opus 4.6
      context: 200K
      description: Most intelligent - complex tasks, agentic workflows
    - id: claude-sonnet-4-6
      name: Claude Sonnet 4.6
      context: 200K
      recommended: true
      description: Best balance - coding & computer use
    - id: claude-haiku-4-5
      name: Claude Haiku 4.5
      context: 200K
      description: Fastest - cost-effective for simple queries

